kind = "web"
previewPath = "/"
title = "InvestNow Estate"
version = "1.0.0"
id = "artifacts/investnow-estate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19008

[services.development]
run = "pnpm --filter @workspace/investnow-estate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investnow-estate", "run", "build" ]
publicDir = "artifacts/investnow-estate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19008"
BASE_PATH = "/"
